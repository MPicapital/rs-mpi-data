name: Tinh Diem RS Hang Ngay

on:
  schedule:
    # Chạy vào 08:30 UTC (tương đương 15:30 giờ VN), từ Thứ 2 đến Thứ 6
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # Cho phép bạn bấm chạy thủ công để test

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Check out kho luu tru
      uses: actions/checkout@v3

    - name: Cai dat Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cai dat thu vien
      run: pip install -r requirements.txt

    - name: Chay tinh toan RS
      run: python main.py

    - name: Luu file du lieu vao GitHub
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Tu dong cap nhat diem RS"
        file_pattern: data_rs.json
